# yamllint disable rule:line-length
apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-blastwall-spo-profiles
  namespace: acm-spo-policies
  annotations:
    policy.open-cluster-management.io/description: Deploy Blastwall SPO SELinux profiles, SCCs, RBAC, and validation config from upstream manifests.
spec:
  disabled: false
  remediationAction: enforce
  dependencies:
    - apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      name: policy-spo-rawselinuxprofile-crd
      namespace: acm-spo-policies
      compliance: Compliant
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: blastwall-spo-profiles
        spec:
          remediationAction: enforce
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: blastwall-spo
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: selinux-profile
                    blastwall.io/profile: openshift-spo
                  annotations:
                    blastwall.io/source: openshift/spo
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: blastwall-workloads
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: validation
                    blastwall.io/profile: openshift-spo
                    security.openshift.io/scc.podSecurityLabelSync: "false"
                    pod-security.kubernetes.io/enforce: privileged
                    pod-security.kubernetes.io/audit: restricted
                    pod-security.kubernetes.io/warn: restricted
                  annotations:
                    blastwall.io/source: openshift/spo
            - complianceType: musthave
              objectDefinition:
                apiVersion: security-profiles-operator.x-k8s.io/v1alpha2
                kind: RawSelinuxProfile
                metadata:
                  name: blastwall
                  namespace: blastwall-spo
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: selinux-profile
                    blastwall.io/profile: openshift-spo
                    blastwall.io/workload-class: blastwall
                  annotations:
                    blastwall.io/policy-version: "0.5.2"
                    blastwall.io/policy-release: "1"
                    blastwall.io/policy-nevra: blastwall-selinux-0.5.2-1
                    blastwall.io/source: policy/Makefile
                spec:
                  policy: |
                    (blockinherit container)

                    (optional blastwall_userns_deny
                      (deny process self (user_namespace (create)))
                      (neverallow process self (user_namespace (create))))

                    (optional blastwall_xfrm_deny
                      (deny process self (netlink_xfrm_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind nlmsg_read nlmsg_write read recv_msg recvfrom relabelfrom
                         relabelto send_msg sendto setattr setopt shutdown write)))
                      (neverallow process self (netlink_xfrm_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind nlmsg_read nlmsg_write read recv_msg recvfrom relabelfrom
                         relabelto send_msg sendto setattr setopt shutdown write))))

                    (optional blastwall_rxrpc_deny
                      (deny process self (rxrpc_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write)))
                      (neverallow process self (rxrpc_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write))))

                    (optional blastwall_packet_socket_deny
                      (deny process self (packet_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write)))
                      (neverallow process self (packet_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write))))

                    (optional blastwall_alg_socket_deny
                      (deny process self (alg_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write)))
                      (neverallow process self (alg_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write))))

                    (optional blastwall_bpf_deny
                      (deny process self (bpf
                        (map_create map_read map_write prog_load prog_run)))
                      (neverallow process self (bpf
                        (map_create map_read map_write prog_load prog_run))))

                    (optional blastwall_capability2_bpf_deny
                      (deny process self (capability2 (bpf)))
                      (neverallow process self (capability2 (bpf))))

                    (optional blastwall_io_uring_deny
                      (deny process self (io_uring
                        (cmd map override_creds sqpoll)))
                      (neverallow process self (io_uring
                        (cmd map override_creds sqpoll))))
            - complianceType: musthave
              objectDefinition:
                apiVersion: security-profiles-operator.x-k8s.io/v1alpha2
                kind: RawSelinuxProfile
                metadata:
                  name: blastwallnested
                  namespace: blastwall-spo
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: selinux-profile
                    blastwall.io/profile: openshift-spo
                    blastwall.io/workload-class: blastwall-nested
                    blastwall.io/public-profile-name: blastwall-nested
                  annotations:
                    blastwall.io/policy-version: "0.5.2"
                    blastwall.io/policy-release: "1"
                    blastwall.io/policy-nevra: blastwall-selinux-0.5.2-1
                    blastwall.io/source: policy/Makefile
                spec:
                  policy: |
                    (blockinherit container)

                    (optional blastwall_nested_xfrm_deny
                      (deny process self (netlink_xfrm_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind nlmsg_read nlmsg_write read recv_msg recvfrom relabelfrom
                         relabelto send_msg sendto setattr setopt shutdown write)))
                      (neverallow process self (netlink_xfrm_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind nlmsg_read nlmsg_write read recv_msg recvfrom relabelfrom
                         relabelto send_msg sendto setattr setopt shutdown write))))

                    (optional blastwall_nested_rxrpc_deny
                      (deny process self (rxrpc_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write)))
                      (neverallow process self (rxrpc_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write))))

                    (optional blastwall_nested_packet_socket_deny
                      (deny process self (packet_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write)))
                      (neverallow process self (packet_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write))))

                    (optional blastwall_nested_alg_socket_deny
                      (deny process self (alg_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write)))
                      (neverallow process self (alg_socket
                        (accept append bind connect create getattr getopt ioctl listen lock map
                         name_bind read recv_msg recvfrom relabelfrom relabelto send_msg sendto
                         setattr setopt shutdown write))))

                    (optional blastwall_nested_bpf_deny
                      (deny process self (bpf
                        (map_create map_read map_write prog_load prog_run)))
                      (neverallow process self (bpf
                        (map_create map_read map_write prog_load prog_run))))

                    (optional blastwall_nested_capability2_bpf_deny
                      (deny process self (capability2 (bpf)))
                      (neverallow process self (capability2 (bpf))))

                    (optional blastwall_nested_io_uring_deny
                      (deny process self (io_uring
                        (cmd map override_creds sqpoll)))
                      (neverallow process self (io_uring
                        (cmd map override_creds sqpoll))))
            - complianceType: musthave
              objectDefinition:
                apiVersion: security.openshift.io/v1
                kind: SecurityContextConstraints
                metadata:
                  name: blastwall-confined
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: workload-binding
                    blastwall.io/profile: openshift-spo
                  annotations:
                    kubernetes.io/description: >-
                      Runs selected workloads under the Security Profiles Operator SELinux type blastwall_.process while preserving OpenShift namespace MCS categories.
                    blastwall.io/policy-version: "0.5.2"
                    blastwall.io/policy-release: "1"
                    blastwall.io/policy-nevra: blastwall-selinux-0.5.2-1
                    blastwall.io/source: openshift/spo
                allowHostDirVolumePlugin: false
                allowHostIPC: false
                allowHostNetwork: false
                allowHostPID: false
                allowHostPorts: false
                allowPrivilegeEscalation: false
                allowPrivilegedContainer: false
                allowedCapabilities: []
                defaultAddCapabilities: []
                fsGroup:
                  type: MustRunAs
                groups: []
                priority: null
                readOnlyRootFilesystem: false
                requiredDropCapabilities:
                  - ALL
                runAsUser:
                  type: MustRunAsRange
                seLinuxContext:
                  type: MustRunAs
                  seLinuxOptions:
                    type: blastwall_.process
                seccompProfiles:
                  - runtime/default
                supplementalGroups:
                  type: RunAsAny
                users: []
                volumes:
                  - configMap
                  - downwardAPI
                  - emptyDir
                  - projected
                  - secret
            - complianceType: musthave
              objectDefinition:
                apiVersion: security.openshift.io/v1
                kind: SecurityContextConstraints
                metadata:
                  name: blastwall-nested
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: workload-binding
                    blastwall.io/profile: openshift-spo
                    blastwall.io/workload-class: blastwall-nested
                  annotations:
                    kubernetes.io/description: >-
                      Runs selected nested workloads under the Security Profiles Operator SELinux type blastwallnested_.process with pod-level user namespace behavior. UID and group strategy fields are RunAsAny because they are interpreted inside the pod user namespace.
                    blastwall.io/policy-version: "0.5.2"
                    blastwall.io/policy-release: "1"
                    blastwall.io/policy-nevra: blastwall-selinux-0.5.2-1
                    blastwall.io/source: openshift/spo
                allowHostDirVolumePlugin: false
                allowHostIPC: false
                allowHostNetwork: false
                allowHostPID: false
                allowHostPorts: false
                allowPrivilegeEscalation: false
                allowPrivilegedContainer: false
                allowedCapabilities: []
                defaultAddCapabilities: []
                fsGroup:
                  type: RunAsAny
                groups: []
                priority: null
                readOnlyRootFilesystem: false
                requiredDropCapabilities:
                  - ALL
                runAsUser:
                  type: RunAsAny
                seLinuxContext:
                  type: MustRunAs
                  seLinuxOptions:
                    type: blastwallnested_.process
                seccompProfiles:
                  - runtime/default
                supplementalGroups:
                  type: RunAsAny
                userNamespaceLevel: RequirePodLevel
                users: []
                volumes:
                  - configMap
                  - downwardAPI
                  - emptyDir
                  - projected
                  - secret
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: blastwall-runner
                  namespace: blastwall-workloads
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: validation
                    blastwall.io/profile: openshift-spo
                  annotations:
                    blastwall.io/source: openshift/spo
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: use-blastwall-confined-scc
                  namespace: blastwall-workloads
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: workload-binding
                    blastwall.io/profile: openshift-spo
                  annotations:
                    blastwall.io/source: openshift/spo
                rules:
                  - apiGroups:
                      - security.openshift.io
                    resources:
                      - securitycontextconstraints
                    resourceNames:
                      - blastwall-confined
                    verbs:
                      - use
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: blastwall-runner-uses-confined-scc
                  namespace: blastwall-workloads
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: workload-binding
                    blastwall.io/profile: openshift-spo
                  annotations:
                    blastwall.io/source: openshift/spo
                subjects:
                  - kind: ServiceAccount
                    name: blastwall-runner
                    namespace: blastwall-workloads
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: Role
                  name: use-blastwall-confined-scc
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ServiceAccount
                metadata:
                  name: blastwall-nested-runner
                  namespace: blastwall-workloads
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: validation
                    blastwall.io/profile: openshift-spo
                    blastwall.io/workload-class: blastwall-nested
                  annotations:
                    blastwall.io/source: openshift/spo
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: Role
                metadata:
                  name: use-blastwall-nested-scc
                  namespace: blastwall-workloads
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: workload-binding
                    blastwall.io/profile: openshift-spo
                    blastwall.io/workload-class: blastwall-nested
                  annotations:
                    blastwall.io/source: openshift/spo
                rules:
                  - apiGroups:
                      - security.openshift.io
                    resources:
                      - securitycontextconstraints
                    resourceNames:
                      - blastwall-nested
                    verbs:
                      - use
            - complianceType: musthave
              objectDefinition:
                apiVersion: rbac.authorization.k8s.io/v1
                kind: RoleBinding
                metadata:
                  name: blastwall-nested-runner-uses-nested-scc
                  namespace: blastwall-workloads
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: workload-binding
                    blastwall.io/profile: openshift-spo
                    blastwall.io/workload-class: blastwall-nested
                  annotations:
                    blastwall.io/source: openshift/spo
                subjects:
                  - kind: ServiceAccount
                    name: blastwall-nested-runner
                    namespace: blastwall-workloads
                roleRef:
                  apiGroup: rbac.authorization.k8s.io
                  kind: Role
                  name: use-blastwall-nested-scc
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: ConfigMap
                metadata:
                  name: blastwall-spo-probe
                  namespace: blastwall-workloads
                  labels:
                    app.kubernetes.io/name: blastwall
                    app.kubernetes.io/component: validation
                    blastwall.io/profile: openshift-spo
                  annotations:
                    blastwall.io/policy-version: "0.5.2"
                    blastwall.io/policy-release: "1"
                    blastwall.io/policy-nevra: blastwall-selinux-0.5.2-1
                    blastwall.io/source: tests/openshift/blastwall_spo_probe.py
                data:
                  blastwall_spo_probe.py: |
                    #!/usr/bin/env python3
                    import ctypes
                    import errno
                    import json
                    import os
                    import socket
                    import struct
                    import subprocess
                    import sys
                    from pathlib import Path

                    EXPECTED_TYPE = os.environ.get("BLASTWALL_EXPECTED_SELINUX_TYPE", "blastwall_.process")
                    PROFILE_CLASS = os.environ.get("BLASTWALL_PROFILE_CLASS", "standard")

                    def classify_errno(exc):
                        value = getattr(exc, "errno", None)
                        if value in (errno.EPERM, errno.EACCES):
                            return "BLOCKED"
                        if value in (errno.EAFNOSUPPORT, errno.EPROTONOSUPPORT, errno.ENOPROTOOPT, errno.ENOSYS):
                            return "SKIP"
                        return "FAIL"

                    def probe_socket(name, family, socktype, proto=0):
                        try:
                            sock = socket.socket(family, socktype, proto)
                            sock.close()
                            return {"name": name, "status": "FAIL", "detail": "socket creation succeeded"}
                        except OSError as exc:
                            return {"name": name, "status": classify_errno(exc), "detail": f"errno {exc.errno}: {exc.strerror}"}

                    def probe_userns():
                        libc = ctypes.CDLL(None, use_errno=True)
                        CLONE_NEWUSER = 0x10000000
                        rc = libc.unshare(CLONE_NEWUSER)
                        if rc == 0:
                            return {"name": "userns", "status": "FAIL", "detail": "unshare(CLONE_NEWUSER) succeeded"}
                        err = ctypes.get_errno()
                        if err in (errno.EPERM, errno.EACCES):
                            return {"name": "userns", "status": "BLOCKED", "detail": f"errno {err}: {os.strerror(err)}"}
                        if err in (errno.EINVAL, errno.ENOSYS):
                            return {"name": "userns", "status": "SKIP", "detail": f"errno {err}: {os.strerror(err)}"}
                        return {"name": "userns", "status": "FAIL", "detail": f"errno {err}: {os.strerror(err)}"}

                    def read_proc_file(name, path):
                        try:
                            value = Path(path).read_text(encoding="utf-8", errors="replace").strip()
                            return {"name": name, "status": "PASS", "detail": value.replace("\n", " | ")}
                        except Exception as exc:
                            return {"name": name, "status": "SKIP", "detail": f"unavailable: {exc}"}

                    def probe_syscall(name, number):
                        if number is None:
                            return {"name": name, "status": "SKIP", "detail": "syscall number unavailable for this architecture"}
                        libc = ctypes.CDLL(None, use_errno=True)
                        rc = libc.syscall(number, 0, 0, 0)
                        if rc == 0:
                            return {"name": name, "status": "FAIL", "detail": "syscall unexpectedly succeeded"}
                        err = ctypes.get_errno()
                        if err in (errno.EPERM, errno.EACCES):
                            return {"name": name, "status": "BLOCKED", "detail": f"errno {err}: {os.strerror(err)}"}
                        if err in (errno.ENOSYS, errno.EINVAL, errno.EFAULT):
                            return {"name": name, "status": "SKIP", "detail": f"errno {err}: {os.strerror(err)}"}
                        return {"name": name, "status": "FAIL", "detail": f"errno {err}: {os.strerror(err)}"}

                    def probe_bpf():
                        number = 321 if os.uname().machine == "x86_64" else None
                        if number is None:
                            return {"name": "bpf", "status": "SKIP", "detail": "syscall number unavailable for this architecture"}
                        libc = ctypes.CDLL(None, use_errno=True)
                        attr = ctypes.create_string_buffer(256)
                        struct.pack_into("IIIII", attr, 0, 1, 4, 4, 1, 0)
                        rc = libc.syscall(number, 0, ctypes.byref(attr), ctypes.sizeof(attr))
                        if rc >= 0:
                            os.close(rc)
                            return {"name": "bpf", "status": "FAIL", "detail": "BPF_MAP_CREATE succeeded"}
                        err = ctypes.get_errno()
                        if err in (errno.EPERM, errno.EACCES):
                            return {"name": "bpf", "status": "BLOCKED", "detail": f"errno {err}: {os.strerror(err)}"}
                        if err in (errno.ENOSYS, errno.EINVAL, errno.E2BIG):
                            return {"name": "bpf", "status": "SKIP", "detail": f"errno {err}: {os.strerror(err)}"}
                        return {"name": "bpf", "status": "FAIL", "detail": f"errno {err}: {os.strerror(err)}"}

                    def probe_io_uring_setup():
                        number = 425 if os.uname().machine == "x86_64" else None
                        if number is None:
                            return {"name": "io_uring_setup", "status": "SKIP", "detail": "syscall number unavailable for this architecture"}
                        libc = ctypes.CDLL(None, use_errno=True)
                        params = ctypes.create_string_buffer(256)
                        rc = libc.syscall(number, 2, ctypes.byref(params))
                        if rc >= 0:
                            os.close(rc)
                            return {"name": "io_uring_setup", "status": "FAIL", "detail": "io_uring_setup succeeded"}
                        err = ctypes.get_errno()
                        if err in (errno.EPERM, errno.EACCES):
                            return {"name": "io_uring_setup", "status": "BLOCKED", "detail": f"errno {err}: {os.strerror(err)}"}
                        if err in (errno.ENOSYS, errno.EINVAL):
                            return {"name": "io_uring_setup", "status": "SKIP", "detail": f"errno {err}: {os.strerror(err)}"}
                        return {"name": "io_uring_setup", "status": "FAIL", "detail": f"errno {err}: {os.strerror(err)}"}

                    def read_context():
                        try:
                            context = subprocess.check_output(["id", "-Z"], text=True, stderr=subprocess.STDOUT).strip()
                            if context:
                                return context
                        except Exception:
                            pass

                        try:
                            return Path("/proc/self/attr/current").read_text(encoding="utf-8", errors="replace").strip("\x00\n")
                        except Exception as exc:
                            return f"unavailable: {exc}"

                    context = read_context()
                    userns_result = probe_userns()
                    if PROFILE_CLASS == "nested" and userns_result["name"] == "userns":
                        if userns_result["status"] == "FAIL" and "succeeded" in userns_result["detail"]:
                            userns_result = {"name": "userns", "status": "PASS", "detail": "unshare(CLONE_NEWUSER) succeeded"}
                        elif userns_result["status"] in ("BLOCKED", "SKIP"):
                            userns_result = {
                                "name": "userns",
                                "status": userns_result["status"],
                                "detail": f"second user namespace not required: {userns_result['detail']}",
                            }

                    results = [
                        {"name": "selinux_context", "status": "PASS" if EXPECTED_TYPE in context else "FAIL", "detail": context},
                        probe_socket("NETLINK_XFRM", socket.AF_NETLINK, socket.SOCK_RAW, 6),
                        probe_socket("AF_RXRPC", getattr(socket, "AF_RXRPC", 33), socket.SOCK_DGRAM, 0),
                        probe_socket("AF_PACKET", socket.AF_PACKET, socket.SOCK_RAW, socket.htons(0x0003)),
                        probe_socket("AF_ALG", getattr(socket, "AF_ALG", 38), socket.SOCK_SEQPACKET, 0),
                        userns_result,
                        probe_bpf(),
                        probe_io_uring_setup(),
                    ]
                    if PROFILE_CLASS == "nested":
                        results.extend([
                            read_proc_file("uid_map", "/proc/self/uid_map"),
                            read_proc_file("gid_map", "/proc/self/gid_map"),
                        ])
                    overall = "PASS" if all(item["status"] in ("PASS", "BLOCKED", "SKIP") for item in results) else "FAIL"
                    print(f"Profile class: {PROFILE_CLASS}")
                    print(f"SELinux context: {context}")
                    for item in results:
                        print(f"{item['status']}: {item['name']}: {item['detail']}")
                    print(json.dumps({
                        "overall": overall,
                        "profile_class": PROFILE_CLASS,
                        "expected_type": EXPECTED_TYPE,
                        "selinux_context": context,
                        "results": results,
                    }, sort_keys=True))
                    sys.exit(0 if overall == "PASS" else 1)
