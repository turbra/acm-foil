apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: policy-spo-rawselinuxprofile-crd
  namespace: acm-spo-policies
  annotations:
    policy.open-cluster-management.io/description: >-
      Checks that the Security Profiles Operator RawSelinuxProfile CRD is
      established before Blastwall RawSelinuxProfile resources are enforced.
spec:
  remediationAction: inform
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: spo-rawselinuxprofile-crd
        spec:
          remediationAction: inform
          severity: high
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: apiextensions.k8s.io/v1
                kind: CustomResourceDefinition
                metadata:
                  name: rawselinuxprofiles.security-profiles-operator.x-k8s.io
                status:
                  conditions:
                    - type: Established
                      status: "True"
